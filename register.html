{% extends "base.html" %}

{% block title %}إنشاء حساب - PriceTracker{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 30px auto;">
    <div style="text-align: center; margin-bottom: 30px;">
        <i class="fas fa-user-plus" style="font-size: 50px; color: #667eea;"></i>
        <h1 style="margin-top: 20px; color: #667eea;">إنشاء حساب جديد</h1>
        <p style="color: #666; margin-top: 10px;">ابدأ في تتبع أسعار منتجاتك الآن</p>
    </div>
    
    <form method="POST">
        <div class="form-group">
            <label><i class="fas fa-user"></i> الاسم</label>
            <input type="text" name="name" class="form-control" required placeholder="أدخل اسمك الكامل">
        </div>
        
        <div class="form-group">
            <label><i class="fas fa-envelope"></i> البريد الإلكتروني (اختياري)</label>
            <input type="email" name="email" class="form-control" placeholder="أدخل البريد الإلكتروني">
        </div>
        
        <div class="form-group">
            <label><i class="fas fa-phone"></i> رقم الهاتف (اختياري)</label>
            <input type="tel" name="phone" class="form-control" placeholder="أدخل رقم الهاتف">
        </div>
        
        <div class="form-group">
            <label><i class="fas fa-lock"></i> كلمة المرور</label>
            <input type="password" name="password" class="form-control" required placeholder="أدخل كلمة المرور">
        </div>
        
        <div class="form-group">
            <label><i class="fas fa-lock"></i> تأكيد كلمة المرور</label>
            <input type="password" name="confirm_password" class="form-control" required placeholder="أعد إدخال كلمة المرور">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">
            <i class="fas fa-user-plus"></i> إنشاء الحساب
        </button>
    </form>
    
    <p style="text-align: center; margin-top: 20px; color: #666;">
        لديك حساب بالفعل؟ 
        <a href="{{ url_for('login') }}" style="color: #667eea; font-weight: 600;">تسجيل الدخول</a>
    </p>
</div>
{% endblock %}
